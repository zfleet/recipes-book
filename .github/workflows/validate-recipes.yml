name: Validate Cooklang recipes

on:
  push:
    paths:
      - '**/*.cook'
      - '.github/workflows/validate-recipes.yml'
  pull_request:
    paths:
      - '**/*.cook'
      - '.github/workflows/validate-recipes.yml'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install CookCLI
        run: |
          set -e
          export PATH="$HOME/.local/bin:$PATH"

          if command -v cook >/dev/null 2>&1; then
            echo "CookCLI already installed"
            cook --version
            exit 0
          fi

          arch=$(uname -m)
          case "$arch" in
            x86_64) asset="cook-x86_64-unknown-linux-gnu.tar.gz" ;;
            aarch64|arm64) asset="cook-aarch64-unknown-linux-gnu.tar.gz" ;;
            *) echo "Unsupported architecture: $arch" >&2 ; exit 1 ;;
          esac

          url="https://github.com/cooklang/cookcli/releases/latest/download/$asset"
          mkdir -p "$HOME/.local/bin" /tmp/cookcli
          curl -L -o /tmp/cookcli/cook.tar.gz "$url"
          tar -xzf /tmp/cookcli/cook.tar.gz -C /tmp/cookcli
          install -m 0755 /tmp/cookcli/cook "$HOME/.local/bin/cook"

          if ! command -v cook >/dev/null 2>&1; then
            echo "CookCLI installation failed after download." >&2
            exit 1
          fi
          cook --version

      - name: Validate all .cook recipes
        run: |
          set -e
          export PATH="$HOME/.local/bin:$PATH"
          cook doctor validate -b . --strict
